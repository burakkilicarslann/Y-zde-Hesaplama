<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#f5f0eb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Percent">
  <meta name="description" content="Smart percentage calculator with 6 calculation modes">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>Percent — Smart Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f0eb; --card: #ffffff; --text1: #1a1a2e; --text2: #666680;
      --accent: #2d3436; --accent-soft: #2d343610; --input-bg: #f8f6f3;
      --input-border: #00000012; --green: #00b894;
    }
    .dark {
      --bg: #0f0f23; --card: #1a1a2e; --text1: #e8e8e8; --text2: #a0a0b0;
      --accent: #e94560; --accent-soft: #e9456020; --input-bg: #16213e;
      --input-border: #ffffff12; --green: #0be881;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg); color: var(--text1);
      min-height: 100vh; transition: background 0.3s, color 0.3s;
      -webkit-tap-highlight-color: transparent;
    }
    .app {
      max-width: 420px; margin: 0 auto; padding: 0 16px 40px;
    }

    /* Header */
    .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0 12px; }
    .header h1 { font-size: 28px; font-weight: 700; letter-spacing: -1px; color: var(--text1); }
    .header p { font-size: 13px; color: var(--text2); margin-top: 2px; font-weight: 500; }
    .header-actions { display: flex; gap: 8px; align-items: center; }
    .icon-btn {
      width: 38px; height: 38px; border-radius: 12px; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-size: 16px;
      background: var(--accent-soft); color: var(--text1); transition: all 0.2s;
    }

    /* Calc Type Selector */
    .type-scroll {
      display: flex; gap: 8px; overflow-x: auto; padding: 8px 0 14px;
      scrollbar-width: none; -ms-overflow-style: none;
      scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch;
      margin: 0 -16px; padding-left: 16px; padding-right: 16px;
    }
    .type-scroll::-webkit-scrollbar { display: none; }
    .type-scroll::after {
      content: ''; flex-shrink: 0; width: 8px;
    }
    .type-btn {
      display: flex; flex-direction: row; align-items: center; gap: 6px;
      padding: 10px 18px; border-radius: 14px; border: 2px solid transparent;
      cursor: pointer; white-space: nowrap; transition: all 0.2s;
      font-family: 'DM Sans', sans-serif; min-width: max-content;
      background: var(--accent-soft); color: var(--text1);
      flex-shrink: 0;
    }
    .type-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .type-btn .icon { font-size: 16px; }
    .type-btn .label { font-size: 13px; font-weight: 600; }

    /* Description */
    .description { font-size: 14px; font-weight: 500; margin: 0 0 14px; font-style: italic; color: var(--text2); }

    /* Card */
    .card {
      border-radius: 18px; padding: 20px; margin-bottom: 14px;
      background: var(--card); box-shadow: 0 2px 20px rgba(0,0,0,0.06);
      transition: all 0.3s;
    }
    .dark .card { box-shadow: 0 2px 20px rgba(0,0,0,0.3); }

    /* Currency */
    .curr-wrap { position: relative; margin-bottom: 16px; }
    .curr-btn {
      display: flex; align-items: center; gap: 6px; padding: 8px 14px;
      border-radius: 10px; border: 1px solid var(--input-border); cursor: pointer;
      font-family: 'DM Sans', sans-serif; background: var(--input-bg); color: var(--text1);
      transition: all 0.2s;
    }
    .curr-btn .sym { font-weight: 700; font-size: 16px; }
    .curr-btn .code { font-size: 13px; }
    .curr-menu {
      position: absolute; top: 42px; left: 0; border-radius: 12px; padding: 4px;
      z-index: 10; min-width: 120px; background: var(--card);
      box-shadow: 0 8px 30px rgba(0,0,0,0.12); display: none;
    }
    .curr-menu.open { display: block; }
    .dark .curr-menu { box-shadow: 0 8px 30px rgba(0,0,0,0.5); }
    .curr-item {
      display: flex; align-items: center; gap: 8px; width: 100%; padding: 10px 14px;
      border: none; border-radius: 8px; cursor: pointer; font-family: 'DM Sans', sans-serif;
      font-size: 14px; background: transparent; color: var(--text1); transition: all 0.15s;
    }
    .curr-item.active { background: var(--accent-soft); }

    /* Input */
    .input-label {
      font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px;
      margin-bottom: 6px; display: block; color: var(--text2);
    }
    .input-wrap {
      display: flex; align-items: center; border-radius: 12px;
      border: 1.5px solid var(--input-border); overflow: hidden;
      background: var(--input-bg); transition: all 0.2s;
    }
    .input-prefix, .input-suffix {
      padding: 0 14px; font-size: 16px; font-weight: 600;
      font-family: 'JetBrains Mono', monospace; color: var(--text2);
    }
    .input-prefix { padding-right: 0; }
    .input-suffix { padding-left: 0; }
    .input-field {
      flex: 1; border: none; outline: none; background: transparent;
      padding: 14px; font-size: 18px; font-family: 'JetBrains Mono', monospace;
      font-weight: 600; width: 100%; color: var(--text1);
    }
    .input-field::placeholder { color: var(--text2); opacity: 0.5; }

    /* Quick Buttons */
    .quick-row { display: flex; gap: 6px; margin-top: 14px; flex-wrap: wrap; }
    .quick-btn {
      padding: 7px 12px; border-radius: 8px; border: none; cursor: pointer;
      font-size: 12px; font-weight: 600; font-family: 'JetBrains Mono', monospace;
      background: var(--accent-soft); color: var(--text1); transition: all 0.15s;
    }
    .quick-btn.active { background: var(--accent); color: #fff; }

    /* Warning */
    .warning {
      margin-top: 12px; padding: 10px 14px; border-radius: 10px;
      font-size: 12px; font-weight: 500; background: #fdcb6e20; color: #d35400;
    }
    .dark .warning { background: #ff6b6b15; color: #ff6b6b; }

    /* Result */
    .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .result-title {
      font-size: 14px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1.2px; opacity: 0.5;
    }
    .copy-btn {
      background: none; border: none; cursor: pointer; padding: 4px;
      display: flex; align-items: center; color: var(--text2); transition: all 0.2s;
    }
    .copy-btn .copied { font-size: 12px; color: var(--green); font-weight: 600; }
    .res-row {
      display: flex; justify-content: space-between; align-items: center; padding: 12px 0;
    }
    .res-row + .res-row { border-top: 1px solid var(--input-border); }
    .res-label { font-size: 13px; font-weight: 500; color: var(--text2); }
    .res-value { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 600; }
    .res-value.highlight { color: var(--green); font-size: 22px; font-weight: 700; }

    /* Formula */
    .formula {
      margin-top: 14px; padding: 12px 14px; border-radius: 10px;
      display: flex; flex-direction: column; font-size: 12px;
      background: var(--accent-soft); color: var(--text2);
    }
    .formula .label { font-weight: 600; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; opacity: 0.6; }
    .formula .expr { font-family: 'JetBrains Mono', monospace; font-size: 12px; margin-top: 4px; }

    /* Empty State */
    .empty { text-align: center; padding: 30px 20px; opacity: 0.35; }
    .empty .emoji { font-size: 36px; margin-bottom: 8px; }
    .empty p { font-size: 14px; }

    /* Clear Button */
    .clear-btn {
      display: block; width: 100%; padding: 14px; border-radius: 14px; border: none;
      cursor: pointer; font-size: 15px; font-weight: 600; font-family: 'DM Sans', sans-serif;
      background: var(--accent-soft); color: var(--text1); transition: all 0.2s; margin-top: 4px;
    }

    /* History Overlay */
    .history-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 100;
      display: none; justify-content: center; align-items: flex-end;
      background: rgba(0,0,0,0.4);
    }
    .history-overlay.open { display: flex; }
    .dark .history-overlay { background: rgba(0,0,0,0.7); }
    .history-panel {
      width: 100%; max-width: 420px; max-height: 75vh;
      border-radius: 24px 24px 0 0; padding: 20px 20px 0;
      overflow-y: auto; background: var(--card); color: var(--text1);
    }
    .hist-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 16px; position: sticky; top: 0; padding-bottom: 10px;
    }
    .hist-header h3 { font-size: 18px; font-weight: 700; }
    .hist-clear {
      background: none; border: 1px solid #d6303133; border-radius: 8px;
      padding: 6px 12px; font-size: 12px; font-weight: 600; cursor: pointer;
      font-family: 'DM Sans', sans-serif; color: #d63031;
    }
    .dark .hist-clear { color: #ff6b6b; border-color: #ff6b6b33; }
    .hist-close {
      background: none; border: none; font-size: 18px; cursor: pointer;
      padding: 4px 8px; color: var(--text1);
    }
    .hist-list { display: flex; flex-direction: column; gap: 8px; padding-bottom: 24px; }
    .hist-item {
      padding: 12px 14px; border-radius: 12px; border: 1px solid #0000000a;
      background: #f8f9fa;
    }
    .dark .hist-item { background: #16213e; border-color: #ffffff0a; }
    .hist-item-top { display: flex; justify-content: space-between; align-items: center; }
    .hist-badge {
      font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 6px;
      text-transform: uppercase; letter-spacing: 0.5px; background: #2d3436; color: #fff;
    }
    .dark .hist-badge { background: #e94560; }
    .hist-time { font-size: 11px; opacity: 0.4; }
    .hist-calc { font-size: 13px; font-family: 'JetBrains Mono', monospace; margin-top: 6px; }
    .hist-result { font-size: 14px; font-weight: 700; margin-top: 4px; color: var(--green); }
    .hist-empty { text-align: center; opacity: 0.5; margin-top: 40px; }

    /* Install Banner */
    .install-banner {
      display: none; padding: 12px 16px; border-radius: 14px; margin-bottom: 14px;
      background: var(--accent); color: #fff; align-items: center; justify-content: space-between;
      cursor: pointer; transition: all 0.2s;
    }
    .install-banner.show { display: flex; }
    .install-banner .text { font-size: 13px; font-weight: 600; }
    .install-banner .sub { font-size: 11px; opacity: 0.7; }
    .install-banner .close-install {
      background: rgba(255,255,255,0.2); border: none; color: #fff; border-radius: 8px;
      padding: 6px 12px; font-size: 12px; font-weight: 600; cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <!-- Header -->
    <div class="header">
      <div>
        <h1>Percent</h1>
        <p>Smart calculator</p>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="histBtn" title="History">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </button>
        <button class="icon-btn" id="themeBtn" title="Toggle theme">🌙</button>
      </div>
    </div>

    <!-- Install Banner -->
    <div class="install-banner" id="installBanner">
      <div>
        <div class="text">📲 Install App</div>
        <div class="sub">Add to home screen for quick access</div>
      </div>
      <button class="close-install" id="installBtn">Install</button>
    </div>

    <!-- Calc Type -->
    <div class="type-scroll" id="typeScroll"></div>

    <!-- Description -->
    <p class="description" id="description"></p>

    <!-- Input Card -->
    <div class="card">
      <div class="curr-wrap">
        <button class="curr-btn" id="currBtn">
          <span class="sym" id="currSym">₺</span>
          <span class="code" id="currCode">TL</span>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="curr-menu" id="currMenu"></div>
      </div>

      <label class="input-label">Amount</label>
      <div class="input-wrap">
        <span class="input-prefix" id="inputPrefix">₺</span>
        <input class="input-field" type="number" inputmode="decimal" step="any" id="amountInput" placeholder="0.00">
      </div>

      <label class="input-label" style="margin-top:14px">Percentage</label>
      <div class="input-wrap">
        <input class="input-field" type="number" inputmode="decimal" step="any" id="percentInput" placeholder="0">
        <span class="input-suffix">%</span>
      </div>

      <div class="quick-row" id="quickRow"></div>

      <div class="warning" id="warning" style="display:none"></div>
    </div>

    <!-- Result Card -->
    <div class="card" id="resultCard" style="display:none">
      <div class="result-header">
        <span class="result-title">Result</span>
        <button class="copy-btn" id="copyBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
        </button>
      </div>
      <div id="resultRows"></div>
      <div class="formula" id="formula">
        <span class="label">Formula</span>
        <span class="expr" id="formulaExpr"></span>
      </div>
    </div>

    <!-- Empty State -->
    <div class="empty" id="emptyState">
      <div class="emoji">🔢</div>
      <p>Enter an amount and percentage to see results</p>
    </div>

    <!-- Clear Button -->
    <button class="clear-btn" id="clearBtn" style="display:none">Clear</button>

    <!-- History -->
    <div class="history-overlay" id="historyOverlay">
      <div class="history-panel">
        <div class="hist-header">
          <h3>History</h3>
          <div style="display:flex;gap:8px">
            <button class="hist-clear" id="histClear">Clear All</button>
            <button class="hist-close" id="histClose">✕</button>
          </div>
        </div>
        <div class="hist-list" id="histList"></div>
      </div>
    </div>
  </div>

  <script>
    // ── State ──
    const CALC_TYPES = [
      { id: "percentage", label: "Calculate %", icon: "%" },
      { id: "add", label: "Add %", icon: "+" },
      { id: "subtract", label: "Subtract %", icon: "−" },
      { id: "discount", label: "Discount", icon: "🏷" },
      { id: "vat", label: "VAT", icon: "🧾" },
      { id: "commission", label: "Commission", icon: "💼" },
    ];
    const CURRENCIES = [
      { code: "TL", symbol: "₺" },
      { code: "USD", symbol: "$" },
      { code: "EUR", symbol: "€" },
    ];
    const QUICK = [1, 10, 18, 20, 25, 50];

    let calcType = "percentage";
    let currency = CURRENCIES[0];
    let history = JSON.parse(localStorage.getItem("pc_history") || "[]");
    let dark = localStorage.getItem("pc_dark") === "true";
    let historyTimer = null;

    // ── Elements ──
    const $ = id => document.getElementById(id);
    const amountInput = $("amountInput");
    const percentInput = $("percentInput");

    // ── Init ──
    function init() {
      if (dark) document.body.classList.add("dark");
      updateThemeBtn();
      renderTypes();
      renderCurrMenu();
      renderQuick();
      updateDescription();
    }

    // ── Calculation ──
    function calc() {
      const a = parseFloat(amountInput.value);
      const p = parseFloat(percentInput.value);
      if (isNaN(a) || isNaN(p)) return null;
      const pa = (a * p) / 100;
      switch (calcType) {
        case "percentage": return { percentAmount: pa };
        case "add": return { percentAmount: pa, total: a + pa };
        case "subtract": return { percentAmount: pa, total: a - pa };
        case "discount": return { discountAmount: pa, discountedPrice: a - pa };
        case "vat": return { vatAmount: pa, totalWithVat: a + pa };
        case "commission": return { commissionAmount: pa, netAmount: a - pa };
        default: return null;
      }
    }

    function fmt(n) {
      if (n === undefined || n === null || isNaN(n)) return "—";
      return n.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    // ── Render ──
    function renderTypes() {
      const el = $("typeScroll");
      el.innerHTML = CALC_TYPES.map(ct =>
        `<button class="type-btn ${ct.id === calcType ? 'active' : ''}" data-type="${ct.id}">
          <span class="icon">${ct.icon}</span><span class="label">${ct.label}</span>
        </button>`
      ).join("");
      el.querySelectorAll(".type-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          calcType = btn.dataset.type;
          renderTypes();
          updateDescription();
          updateResult();
        });
      });
    }

    function renderCurrMenu() {
      const el = $("currMenu");
      el.innerHTML = CURRENCIES.map(c =>
        `<button class="curr-item ${c.code === currency.code ? 'active' : ''}" data-code="${c.code}">
          <span style="font-weight:700">${c.symbol}</span> ${c.code}
        </button>`
      ).join("");
      el.querySelectorAll(".curr-item").forEach(btn => {
        btn.addEventListener("click", () => {
          currency = CURRENCIES.find(c => c.code === btn.dataset.code);
          $("currSym").textContent = currency.symbol;
          $("currCode").textContent = currency.code;
          $("inputPrefix").textContent = currency.symbol;
          el.classList.remove("open");
          renderCurrMenu();
          updateResult();
        });
      });
    }

    function renderQuick() {
      const el = $("quickRow");
      el.innerHTML = QUICK.map(p =>
        `<button class="quick-btn ${percentInput.value === String(p) ? 'active' : ''}" data-p="${p}">${p}%</button>`
      ).join("");
      el.querySelectorAll(".quick-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          percentInput.value = btn.dataset.p;
          renderQuick();
          updateResult();
        });
      });
    }

    function updateDescription() {
      const a = amountInput.value || "___";
      const p = percentInput.value || "___";
      const descs = {
        percentage: `What is ${p}% of ${a}?`,
        add: `Add ${p}% to ${a}`,
        subtract: `Subtract ${p}% from ${a}`,
        discount: `${p}% discount on ${a}`,
        vat: `${p}% VAT on ${a}`,
        commission: `${p}% commission from ${a}`,
      };
      $("description").textContent = descs[calcType];
    }

    function updateResult() {
      const result = calc();
      const warn = $("warning");
      const a = parseFloat(amountInput.value);
      const p = parseFloat(percentInput.value);

      // Warning
      if (!isNaN(a) && a < 0) { warn.textContent = "⚠ Negative amount entered — result may be unexpected."; warn.style.display = "block"; }
      else if (!isNaN(p) && p < 0) { warn.textContent = "⚠ Negative percentage entered — result may be unexpected."; warn.style.display = "block"; }
      else { warn.style.display = "none"; }

      // Clear button
      $("clearBtn").style.display = (amountInput.value || percentInput.value) ? "block" : "none";

      updateDescription();

      if (!result) {
        $("resultCard").style.display = "none";
        $("emptyState").style.display = "block";
        return;
      }

      $("resultCard").style.display = "block";
      $("emptyState").style.display = "none";

      const sym = currency.symbol;
      let rows = [];
      let formulaText = "";
      const av = amountInput.value || 0;
      const pv = percentInput.value || 0;

      switch (calcType) {
        case "percentage":
          rows.push({ label: "Percentage Amount", value: `${sym}${fmt(result.percentAmount)}`, hl: true });
          formulaText = `${av} × ${pv} / 100 = ${fmt(result.percentAmount)}`;
          break;
        case "add":
          rows.push({ label: "Percentage Amount", value: `${sym}${fmt(result.percentAmount)}` });
          rows.push({ label: "Total After Adding", value: `${sym}${fmt(result.total)}`, hl: true });
          formulaText = `${av} + (${av} × ${pv} / 100) = ${fmt(result.total)}`;
          break;
        case "subtract":
          rows.push({ label: "Percentage Amount", value: `${sym}${fmt(result.percentAmount)}` });
          rows.push({ label: "Total After Subtracting", value: `${sym}${fmt(result.total)}`, hl: true });
          formulaText = `${av} − (${av} × ${pv} / 100) = ${fmt(result.total)}`;
          break;
        case "discount":
          rows.push({ label: "Discount Amount", value: `${sym}${fmt(result.discountAmount)}` });
          rows.push({ label: "Discounted Price", value: `${sym}${fmt(result.discountedPrice)}`, hl: true });
          formulaText = `${av} − (${av} × ${pv} / 100) = ${fmt(result.discountedPrice)}`;
          break;
        case "vat":
          rows.push({ label: "VAT Amount", value: `${sym}${fmt(result.vatAmount)}` });
          rows.push({ label: "Total Including VAT", value: `${sym}${fmt(result.totalWithVat)}`, hl: true });
          formulaText = `${av} + (${av} × ${pv} / 100) = ${fmt(result.totalWithVat)}`;
          break;
        case "commission":
          rows.push({ label: "Commission Amount", value: `${sym}${fmt(result.commissionAmount)}` });
          rows.push({ label: "Net Remaining", value: `${sym}${fmt(result.netAmount)}`, hl: true });
          formulaText = `${av} − (${av} × ${pv} / 100) = ${fmt(result.netAmount)}`;
          break;
      }

      $("resultRows").innerHTML = rows.map((r, i) =>
        `<div class="res-row"><span class="res-label">${r.label}</span><span class="res-value ${r.hl ? 'highlight' : ''}">${r.value}</span></div>`
      ).join("");
      $("formulaExpr").textContent = formulaText;

      // History (debounce)
      clearTimeout(historyTimer);
      historyTimer = setTimeout(() => {
        let mainResult = "";
        if (result.percentAmount !== undefined && !result.total && !result.discountedPrice && !result.totalWithVat && !result.netAmount) mainResult = `${sym}${fmt(result.percentAmount)}`;
        if (result.total !== undefined) mainResult = `${sym}${fmt(result.total)}`;
        if (result.discountedPrice !== undefined) mainResult = `${sym}${fmt(result.discountedPrice)}`;
        if (result.totalWithVat !== undefined) mainResult = `${sym}${fmt(result.totalWithVat)}`;
        if (result.netAmount !== undefined) mainResult = `${sym}${fmt(result.netAmount)}`;

        history.unshift({
          type: calcType, amount: amountInput.value, percentage: percentInput.value,
          currSymbol: currency.symbol, mainResult,
          time: new Date().toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit" }),
          typeLabel: CALC_TYPES.find(c => c.id === calcType)?.label,
        });
        history = history.slice(0, 50);
        localStorage.setItem("pc_history", JSON.stringify(history));
      }, 1200);
    }

    function renderHistory() {
      const el = $("histList");
      if (history.length === 0) {
        el.innerHTML = '<p class="hist-empty">No calculations yet</p>';
        $("histClear").style.display = "none";
        return;
      }
      $("histClear").style.display = "inline-block";
      el.innerHTML = history.map(h =>
        `<div class="hist-item">
          <div class="hist-item-top">
            <span class="hist-badge">${h.typeLabel}</span>
            <span class="hist-time">${h.time}</span>
          </div>
          <div class="hist-calc">${h.currSymbol}${fmt(parseFloat(h.amount))} × ${h.percentage}%</div>
          <div class="hist-result">${h.mainResult}</div>
        </div>`
      ).join("");
    }

    // ── Events ──
    amountInput.addEventListener("input", () => { updateResult(); renderQuick(); });
    percentInput.addEventListener("input", () => { updateResult(); renderQuick(); });

    $("currBtn").addEventListener("click", () => $("currMenu").classList.toggle("open"));
    document.addEventListener("click", e => {
      if (!e.target.closest(".curr-wrap")) $("currMenu").classList.remove("open");
    });

    $("themeBtn").addEventListener("click", () => {
      dark = !dark;
      document.body.classList.toggle("dark", dark);
      localStorage.setItem("pc_dark", dark);
      updateThemeBtn();
      // Update theme-color meta
      document.querySelector('meta[name="theme-color"]').content = dark ? "#0f0f23" : "#f5f0eb";
    });

    function updateThemeBtn() {
      $("themeBtn").textContent = dark ? "☀️" : "🌙";
    }

    $("copyBtn").addEventListener("click", () => {
      const result = calc();
      if (!result) return;
      const sym = currency.symbol;
      let text = `Calculation: ${CALC_TYPES.find(c => c.id === calcType)?.label}\nAmount: ${sym}${amountInput.value}\nPercentage: ${percentInput.value}%\n`;
      if (result.percentAmount !== undefined) text += `Percentage Amount: ${sym}${fmt(result.percentAmount)}\n`;
      if (result.total !== undefined) text += `Total: ${sym}${fmt(result.total)}\n`;
      if (result.discountedPrice !== undefined) text += `Discounted Price: ${sym}${fmt(result.discountedPrice)}\n`;
      if (result.totalWithVat !== undefined) text += `Total w/ VAT: ${sym}${fmt(result.totalWithVat)}\n`;
      if (result.netAmount !== undefined) text += `Net Remaining: ${sym}${fmt(result.netAmount)}\n`;
      navigator.clipboard.writeText(text).then(() => {
        $("copyBtn").innerHTML = '<span class="copied">Copied!</span>';
        setTimeout(() => {
          $("copyBtn").innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>';
        }, 1500);
      });
    });

    $("clearBtn").addEventListener("click", () => {
      amountInput.value = "";
      percentInput.value = "";
      updateResult();
      renderQuick();
    });

    $("histBtn").addEventListener("click", () => {
      renderHistory();
      $("historyOverlay").classList.add("open");
    });
    $("histClose").addEventListener("click", () => $("historyOverlay").classList.remove("open"));
    $("historyOverlay").addEventListener("click", e => {
      if (e.target === $("historyOverlay")) $("historyOverlay").classList.remove("open");
    });
    $("histClear").addEventListener("click", () => {
      history = [];
      localStorage.setItem("pc_history", "[]");
      renderHistory();
    });

    // ── PWA Install ──
    let deferredPrompt;
    window.addEventListener("beforeinstallprompt", e => {
      e.preventDefault();
      deferredPrompt = e;
      $("installBanner").classList.add("show");
    });
    $("installBtn").addEventListener("click", async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      deferredPrompt = null;
      $("installBanner").classList.remove("show");
    });

    // ── Service Worker ──
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js", { scope: "/Calculator-Percent/" }).then(() => {
        console.log("Service Worker registered");
      });
    }

    // ── Start ──
    init();
  </script>
</body>
</html>
